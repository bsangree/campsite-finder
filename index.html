<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bay Area Campsite Finder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    [x-cloak] { display: none; }
  </style>
</head>
<body class="bg-stone-50 text-stone-900">

<div class="max-w-7xl mx-auto px-4 py-6">

  <!-- Header -->
  <header class="mb-6">
    <h1 class="text-3xl font-bold tracking-tight">🏕️ Bay Area Campsite Finder</h1>
    <p class="text-stone-600 mt-1">One place to check every campground around the Bay. Pick dates, filter, click through to book.</p>
  </header>

  <div class="grid grid-cols-1 lg:grid-cols-[280px_1fr] gap-6">

    <!-- ========== FILTER SIDEBAR ========== -->
    <aside class="bg-white border border-stone-200 rounded-xl p-5 h-fit lg:sticky lg:top-4 space-y-5">

      <!-- Dates -->
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-stone-500 mb-2">Arrive</label>
        <div class="flex gap-1.5">
          <button id="prevWeek" title="Back one week" class="px-2.5 border border-stone-300 rounded-lg hover:bg-stone-100 text-stone-600">◀</button>
          <input id="startDate" type="date" class="flex-1 min-w-0 border border-stone-300 rounded-lg px-3 py-2 text-sm" />
          <button id="nextWeek" title="Forward one week" class="px-2.5 border border-stone-300 rounded-lg hover:bg-stone-100 text-stone-600">▶</button>
        </div>
        <div class="flex gap-1.5 mt-2">
          <select id="nights" class="flex-1 border border-stone-300 rounded-lg px-3 py-2 text-sm">
            <option value="1">1 night</option>
            <option value="2" selected>2 nights</option>
            <option value="3">3 nights</option>
            <option value="4">4 nights</option>
            <option value="5">5 nights</option>
            <option value="7">1 week</option>
          </select>
        </div>
        <div id="dateSummary" class="text-xs text-stone-500 mt-2 text-center"></div>
        <div class="grid grid-cols-3 gap-1.5 mt-2">
          <button data-quick="tonight" class="quick-date text-xs px-2 py-1.5 bg-stone-100 hover:bg-stone-200 rounded-md">Tonight</button>
          <button data-quick="weekend" class="quick-date text-xs px-2 py-1.5 bg-stone-100 hover:bg-stone-200 rounded-md">This wknd</button>
          <button data-quick="next-weekend" class="quick-date text-xs px-2 py-1.5 bg-stone-100 hover:bg-stone-200 rounded-md">Next wknd</button>
        </div>
      </div>

      <!-- Drive time -->
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-stone-500 mb-2">Max drive from SF</label>
        <select id="maxDrive" class="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm">
          <option value="999">Any</option>
          <option value="45">45 min</option>
          <option value="60">1 hr</option>
          <option value="90">1.5 hr</option>
          <option value="120">2 hr</option>
        </select>
      </div>

      <!-- Environment -->
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-stone-500 mb-2">Environment</label>
        <div id="envFilters" class="space-y-1.5 text-sm">
          <label class="flex items-center gap-2"><input type="checkbox" value="redwoods" class="rounded"> 🌲 Redwoods</label>
          <label class="flex items-center gap-2"><input type="checkbox" value="coast" class="rounded"> 🌊 Coast</label>
          <label class="flex items-center gap-2"><input type="checkbox" value="lake" class="rounded"> 🛶 Lake</label>
          <label class="flex items-center gap-2"><input type="checkbox" value="oak_woodland" class="rounded"> 🌳 Oak woodland</label>
          <label class="flex items-center gap-2"><input type="checkbox" value="grassland" class="rounded"> 🌾 Grassland</label>
          <label class="flex items-center gap-2"><input type="checkbox" value="chaparral" class="rounded"> 🌵 Chaparral</label>
        </div>
      </div>

      <!-- Availability -->
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-stone-500 mb-2">Availability</label>
        <label class="flex items-center gap-2 text-sm font-medium text-emerald-700">
          <input id="availOnly" type="checkbox" class="rounded accent-emerald-600"> 🟢 Available only
        </label>
      </div>

      <!-- Toggles -->
      <div class="space-y-2 text-sm">
        <label class="flex items-center gap-2"><input id="dogsOnly" type="checkbox" class="rounded"> 🐕 Dogs allowed</label>
        <label class="flex items-center gap-2"><input id="rvOnly" type="checkbox" class="rounded"> 🚐 RV sites</label>
        <label class="flex items-center gap-2"><input id="driveInOnly" type="checkbox" class="rounded"> 🚗 Drive-in only</label>
      </div>

      <button id="clearFilters" class="w-full text-xs text-stone-500 hover:text-stone-900 pt-2 border-t border-stone-200">Clear filters</button>
    </aside>

    <!-- ========== RESULTS ========== -->
    <main>
      <div id="statusBar" class="flex flex-wrap items-center gap-2 mb-4"></div>
      <div class="flex items-baseline justify-between mb-3">
        <div id="resultCount" class="text-sm text-stone-600"></div>
        <select id="sortBy" class="text-sm border border-stone-300 rounded-lg px-2 py-1.5">
          <option value="availability">Sort: Availability</option>
          <option value="drive">Sort: Drive time</option>
          <option value="name">Sort: Name</option>
        </select>
      </div>
      <div id="results" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
      <div id="emptyState" class="hidden text-center py-16 text-stone-500">
        <div class="text-4xl mb-2">🌲</div>
        <p>No campgrounds match those filters.</p>
        <button onclick="document.getElementById('clearFilters').click()" class="mt-3 text-sm text-emerald-700 hover:underline">Clear filters</button>
      </div>
    </main>
  </div>
</div>

// ============================================================================
// AVAILABILITY
// reserve_ca → live via ReserveCalifornia's RDR API (CORS-open, no key needed)
// everything else → "check_site" link-out
// ============================================================================

const RC_API = 'https://california-rdr.prod.cali.rd12.recreation-management.tylerapp.com/rdr';

const STATUS_META = {
  loading:    { label: "Checking…",  dot: "bg-stone-300 animate-pulse", text: "text-stone-500",   ring: "ring-stone-200",   sortRank: 1 },
  available:  { label: "Available",  dot: "bg-emerald-500",             text: "text-emerald-700", ring: "ring-emerald-200", sortRank: 0 },
  full:       { label: "Full",       dot: "bg-rose-500",                text: "text-rose-700",    ring: "ring-rose-200",    sortRank: 3 },
  check_site: { label: "Check site", dot: "bg-stone-400",               text: "text-stone-600",   ring: "ring-stone-200",   sortRank: 2 },
  error:      { label: "—",          dot: "bg-stone-300",               text: "text-stone-400",   ring: "ring-stone-200",   sortRank: 2 },
};

// Per-park live status, keyed by park.id. Populated async; render() reads from here.
let liveStatus = {};

function rcPlaceId(park) {
  const m = park.url.match(/reservecalifornia\.com\/park\/(\d+)/);
  return m ? parseInt(m[1], 10) : null;
}

function initialStatus(park) {
  return rcPlaceId(park) ? 'loading' : 'check_site';
}

async function fetchRC(placeId, startISO, nights) {
  const [y,m,d] = startISO.split('-');
  const res = await fetch(RC_API + '/search/place', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      PlaceId: placeId, Latitude: 0, Longitude: 0,
      StartDate: `${m}-${d}-${y}`, Nights: nights,
      CustomerId: 0, UnitCategoryId: 1, SleepingUnitId: 0, MinVehicleLength: 0,
      UnitTypesGroupIds: null, AmenityIds: null, Sort: "name",
      IsADA: false, RestrictADA: false, NearbyLimit: 100,
      isSearchAllParks: false, customerClassificationId: 0,
      InSeasonOnly: true, WebOnly: true, NearbyCountLimit: 0,
      NearbyOnlyAvailable: false, CountNearby: false, CountUnits: true, HighlightedPlaceId: 0,
    })
  });
  const data = await res.json();
  let count = 0;
  for (const f of Object.values(data.SelectedPlace?.Facilities || {})) {
    for (const ut of Object.values(f.UnitTypes || {})) count += ut.AvailableCount || 0;
  }
  return count > 0 ? { status: 'available', sitesAvailable: count } : { status: 'full' };
}

let fetchSeq = 0;
async function refreshAvailability(startISO, nights) {
  const seq = ++fetchSeq;
  liveStatus = {};
  const rcParks = PARKS.filter(p => rcPlaceId(p));
  await Promise.all(rcParks.map(async p => {
    try {
      const r = await fetchRC(rcPlaceId(p), startISO, nights);
      if (seq !== fetchSeq) return; // stale
      liveStatus[p.id] = r;
    } catch (e) {
      if (seq !== fetchSeq) return;
      liveStatus[p.id] = { status: 'error' };
    }
    updateCardStatus(p.id);
  }));
  if (seq === fetchSeq) render(); // re-sort + refresh status bar once all results are in
}

function getStatus(park) {
  return liveStatus[park.id] || { status: initialStatus(park) };
}

// ============================================================================
// RENDERING
// ============================================================================

function buildBookingUrl(park, start) {
  // Most systems don't accept date params reliably; just link to the park page for v1.
  return park.url;
}

function fmtDrive(min) {
  return min < 60 ? `${min} min` : `${Math.floor(min/60)}h ${min%60 ? (min%60)+'m' : ''}`.trim();
}

function statusBadge(avail) {
  const sm = STATUS_META[avail.status];
  return `<span class="w-2 h-2 rounded-full ${sm.dot}"></span>
          <span class="text-xs font-medium ${sm.text}">${sm.label}${avail.sitesAvailable ? ` (${avail.sitesAvailable})` : ''}</span>`;
}

function updateCardStatus(parkId) {
  const el = document.querySelector(`[data-status="${parkId}"]`);
  if (el) el.innerHTML = statusBadge(getStatus(PARKS.find(p => p.id === parkId)));
}

function parkCard(park, start) {
  const sys = SYSTEMS[park.system];
  const avail = getStatus(park);
  const accessLabel = { drive_in: "Drive-in", walk_in: "Walk-in", hike_in: "Hike-in" }[park.access];

  return `
    <div class="bg-white border border-stone-200 rounded-xl p-5 hover:shadow-md transition-shadow">
      <div class="flex items-start justify-between gap-3 mb-2">
        <div>
          <h3 class="font-semibold text-lg leading-tight">${park.name}</h3>
          <div class="flex items-center gap-2 mt-1">
            <span class="text-xs px-2 py-0.5 rounded-full ${sys.color}">${sys.label}</span>
            <span class="text-xs text-stone-500">🚗 ${fmtDrive(park.drive)}</span>
            <span class="text-xs text-stone-500">· ${accessLabel}</span>
          </div>
        </div>
        <div data-status="${park.id}" class="flex items-center gap-1.5 shrink-0">${statusBadge(avail)}</div>
      </div>

      <p class="text-sm text-stone-600 mb-3">${park.desc}</p>

      <div class="flex items-center justify-between">
        <div class="flex flex-wrap gap-1">
          ${park.env.map(e => `<span class="text-xs bg-stone-100 px-2 py-0.5 rounded">${ENV_LABELS[e]}</span>`).join('')}
          ${park.dogs ? `<span class="text-xs bg-stone-100 px-2 py-0.5 rounded">🐕 Dogs</span>` : ''}
          ${park.rv   ? `<span class="text-xs bg-stone-100 px-2 py-0.5 rounded">🚐 RV</span>` : ''}
        </div>
        <a href="${buildBookingUrl(park, start)}" target="_blank" rel="noopener"
           class="shrink-0 ml-3 text-sm font-medium bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg">
          ${rcPlaceId(park) ? 'Book' : 'Check'} →
        </a>
      </div>
    </div>`;
}

function render() {
  const start = document.getElementById('startDate').value;
  const maxDrive = parseInt(document.getElementById('maxDrive').value, 10);
  const envs = [...document.querySelectorAll('#envFilters input:checked')].map(i => i.value);
  const dogsOnly = document.getElementById('dogsOnly').checked;
  const rvOnly = document.getElementById('rvOnly').checked;
  const driveInOnly = document.getElementById('driveInOnly').checked;
  const sortBy = document.getElementById('sortBy').value;

  const availOnly = document.getElementById('availOnly').checked;

  let filtered = PARKS.filter(p => {
    if (p.drive > maxDrive) return false;
    if (envs.length && !envs.some(e => p.env.includes(e))) return false;
    if (dogsOnly && !p.dogs) return false;
    if (rvOnly && !p.rv) return false;
    if (driveInOnly && p.access !== 'drive_in') return false;
    if (availOnly && getStatus(p).status !== 'available') return false;
    return true;
  });

  filtered.sort((a, b) => {
    if (sortBy === 'name') return a.name.localeCompare(b.name);
    if (sortBy === 'availability') {
      const ra = STATUS_META[getStatus(a).status].sortRank, rb = STATUS_META[getStatus(b).status].sortRank;
      return ra !== rb ? ra - rb : a.drive - b.drive;
    }
    return a.drive - b.drive;
  });

  // Status summary bar (counts across ALL parks, not filtered — so you see the full picture)
  const counts = { available: 0, full: 0, check_site: 0, loading: 0, error: 0 };
  PARKS.forEach(p => counts[getStatus(p).status]++);
  const totalSites = PARKS.reduce((n,p) => n + (getStatus(p).sitesAvailable || 0), 0);
  document.getElementById('statusBar').innerHTML = `
    <button onclick="document.getElementById('availOnly').checked=true; render()"
            class="px-3 py-1.5 rounded-full text-sm font-medium bg-emerald-100 text-emerald-800 hover:bg-emerald-200 ${counts.available?'':'opacity-50'}">
      🟢 ${counts.available} available${totalSites ? ` · ${totalSites} sites` : ''}
    </button>
    <span class="px-3 py-1.5 rounded-full text-sm bg-rose-100 text-rose-800">🔴 ${counts.full} full</span>
    <span class="px-3 py-1.5 rounded-full text-sm bg-stone-100 text-stone-700">⚪ ${counts.check_site + counts.error} check manually</span>
    ${counts.loading ? `<span class="px-3 py-1.5 rounded-full text-sm bg-stone-100 text-stone-500 animate-pulse">⏳ ${counts.loading} checking…</span>` : ''}
    ${availOnly ? `<button onclick="document.getElementById('availOnly').checked=false; render()" class="text-xs text-stone-500 hover:text-stone-900 underline">show all</button>` : ''}
  `;

  document.getElementById('resultCount').textContent =
    `${filtered.length} of ${PARKS.length} campgrounds`;
  document.getElementById('results').innerHTML = filtered.map(p => parkCard(p, start)).join('');
  document.getElementById('emptyState').classList.toggle('hidden', filtered.length > 0);
  document.getElementById('results').classList.toggle('hidden', filtered.length === 0);
}

// ============================================================================
// WIRING
// ============================================================================

const fmtISO = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const parseISO = s => { const [y,m,d]=s.split('-').map(Number); return new Date(y, m-1, d); };
const addDays = (d, n) => { const x=new Date(d); x.setDate(x.getDate()+n); return x; };

function upcomingFriday(offsetWeeks = 0) {
  const today = new Date(); today.setHours(0,0,0,0);
  const dow = today.getDay();
  // If it's already Fri/Sat, "this weekend" = today; if Sun, weekend's over → next Fri.
  let daysToFri = dow === 5 ? 0 : dow === 6 ? -1 : ((5 - dow) + 7) % 7;
  if (dow === 6) daysToFri = 0; // Sat: start tonight, not yesterday
  return addDays(today, daysToFri + offsetWeeks*7);
}

function setArrival(date, nights) {
  document.getElementById('startDate').value = fmtISO(date);
  if (nights != null) document.getElementById('nights').value = String(nights);
}

function shiftArrival(days) {
  const cur = parseISO(document.getElementById('startDate').value);
  setArrival(addDays(cur, days));
}

function onDatesChanged() {
  const s = document.getElementById('startDate').value;
  const n = parseInt(document.getElementById('nights').value, 10);
  if (!s) return;
  const arr = parseISO(s), dep = addDays(arr, n);
  const fmt = d => d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
  document.getElementById('dateSummary').textContent = `${fmt(arr)} → ${fmt(dep)}`;
  document.getElementById('startDate').min = fmtISO(new Date());
  render();
  refreshAvailability(s, n);
}

document.addEventListener('DOMContentLoaded', () => {
  setArrival(upcomingFriday(0), 2);

  document.querySelectorAll('.quick-date').forEach(b =>
    b.addEventListener('click', () => {
      const q = b.dataset.quick;
      if (q === 'tonight')      setArrival(new Date(), 1);
      if (q === 'weekend')      setArrival(upcomingFriday(0), 2);
      if (q === 'next-weekend') setArrival(upcomingFriday(1), 2);
      onDatesChanged();
    }));

  document.getElementById('prevWeek').addEventListener('click', () => { shiftArrival(-7); onDatesChanged(); });
  document.getElementById('nextWeek').addEventListener('click', () => { shiftArrival(+7); onDatesChanged(); });

  document.getElementById('clearFilters').addEventListener('click', () => {
    document.getElementById('maxDrive').value = '999';
    document.querySelectorAll('#envFilters input, #dogsOnly, #rvOnly, #driveInOnly, #availOnly').forEach(i => i.checked = false);
    render();
  });

  ['startDate','nights'].forEach(id => document.getElementById(id).addEventListener('change', onDatesChanged));
  ['maxDrive','dogsOnly','rvOnly','driveInOnly','availOnly','sortBy']
    .forEach(id => document.getElementById(id).addEventListener('change', render));
  document.querySelectorAll('#envFilters input').forEach(i => i.addEventListener('change', render));

  onDatesChanged();
});
</script>
